name: Build and Package Android APK

# کارگردان: این بخش مشخص می‌کند که این نمایش چه زمانی باید اجرا شود
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # تنظیمات استودیو و سرور مجازی
    runs-on: ubuntu-latest

    steps:
    # صحنه ۱: دریافت کدها از مخزن
    - name: Checkout Code
      uses: actions/checkout@v4

    # صحنه ۲: تنظیم محیط جاوا (JDK 17 استاندارد فعلی اندروید)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # صحنه ۳: اعطای دسترسی اجرا به Gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # صحنه ۴: بیلد گرفتن از پروژه (تست کامپایل)
    - name: Build with Gradle
      run: ./gradlew build

    # صحنه ۵: ساخت فایل نهایی APK (نسخه Debug)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # صحنه ۶: آپلود و ثبت شات نهایی (ذخیره APK به عنوان Artifact)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
